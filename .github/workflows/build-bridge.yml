name: Build bridge binaries

on:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'bridge/**'
  pull_request:
    paths:
      - 'bridge/**'
  workflow_dispatch:

jobs:
  build-bridge:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: boocloud-bridge-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-15
            artifact: boocloud-bridge-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: boocloud-bridge-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install g++ (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y g++
      - name: Build
        working-directory: bridge
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp bridge/target/${{ matrix.target }}/release/boocloud-bridge dist/boocloud-bridge
          chmod +x dist/boocloud-bridge
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/boocloud-bridge

  release-assets:
    needs: build-bridge
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Ensure the release exists. When this workflow is the first to
          # touch the tag (manual dispatch on a tag ref, or a release.yml
          # branch where github-release hasn't run yet), create a minimal
          # release so `gh release upload` has somewhere to attach assets.
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "Bridge binaries for $TAG."
          fi
          for dir in dist/boocloud-bridge-*; do
            name=$(basename "$dir")
            cp "$dir/boocloud-bridge" "/tmp/$name"
            chmod +x "/tmp/$name"
            rm -rf "$dir"
            mv "/tmp/$name" "dist/$name"
            gh release upload "$TAG" "dist/$name" --repo "${{ github.repository }}" --clobber
          done
          # Upload install script
          gh release upload "$TAG" install.sh --repo "${{ github.repository }}" --clobber
