name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0 or 0.1.0rc1)"
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+$ ]] && [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z or X.Y.ZrcN)"
            exit 1
          fi

      - uses: astral-sh/setup-uv@v5

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Check version is newer than current
        run: |
          VERSION="${{ inputs.version }}"
          CURRENT=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Current version: $CURRENT"
          echo "Target version:  $VERSION"
          uv run python -c "
          from packaging.version import Version
          current = Version('$CURRENT')
          target = Version('$VERSION')
          if target <= current:
              raise SystemExit(f'Target {target} must be newer than current {current}')
          print(f'OK: {current} → {target}')
          "

      - name: Check no existing tag
        run: |
          VERSION="${{ inputs.version }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

      - name: Create or reset release branch
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"
          if git ls-remote --heads origin "refs/heads/${BRANCH}" | grep -q .; then
            echo "Branch ${BRANCH} already exists — will overwrite"
          fi
          git checkout -b "$BRANCH"

      - name: Bump version in pyproject.toml and bridge/Cargo.toml
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          grep "^version = \"${VERSION}\"" pyproject.toml
          sed -i "0,/^version = \".*\"/s//version = \"${VERSION}\"/" bridge/Cargo.toml
          grep "^version = \"${VERSION}\"" bridge/Cargo.toml

      - name: Build changelog with towncrier
        run: |
          VERSION="${{ inputs.version }}"
          echo "=== Changelog preview ==="
          uv run towncrier build --draft --version "$VERSION"
          echo "========================="
          uv run towncrier build --version "$VERSION" --yes
          echo "--- Updated CHANGELOG.md (first 30 lines) ---"
          head -30 CHANGELOG.md

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml bridge/Cargo.toml CHANGELOG.md changes/
          git commit -m "Release v${VERSION}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin "$BRANCH"

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"

          CHANGELOG_BODY=$(awk "/^## ${VERSION//./\\.} /{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)

          PR_BODY="$(cat <<EOF
          ## Release v${VERSION}

          ${CHANGELOG_BODY}

          ---
          **Merge this PR to trigger the release pipeline.**
          The release workflow will build the package, validate on TestPyPI, create the tag, create the GitHub Release, then publish to PyPI.
          EOF
          )"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [[ -n "$EXISTING_PR" ]]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" \
              --title "Release v${VERSION}" \
              --body "$PR_BODY"
          else
            gh pr create \
              --title "Release v${VERSION}" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          fi
