name: Publish bridge Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      bridge: ${{ steps.check.outputs.bridge }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Skip if this is a release PR merge
        id: release
        if: github.event_name == 'push'
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" =~ ^Merge\ pull\ request.*release/v ]]; then
            echo "::notice::Release PR merge — Docker tags handled below"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect changed files
        id: check
        if: steps.release.outputs.skip != 'true'
        run: |
          CHANGED=$(git diff HEAD~1 HEAD --name-only)
          echo "$CHANGED" | grep -qE '^bridge/' \
            && echo "bridge=true" >> "$GITHUB_OUTPUT" || echo "bridge=false" >> "$GITHUB_OUTPUT"

  bridge:
    needs: detect-changes
    if: needs.detect-changes.outputs.bridge == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        bambu-version: ["02.05.00.00"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: bridge
          file: bridge/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            estampo/boocloud-bridge:bambu-${{ matrix.bambu-version }}
            estampo/boocloud-bridge:v${{ needs.detect-changes.outputs.version }}
            estampo/boocloud-bridge:latest
            ghcr.io/${{ github.repository }}/bridge:bambu-${{ matrix.bambu-version }}
            ghcr.io/${{ github.repository }}/bridge:v${{ needs.detect-changes.outputs.version }}
            ghcr.io/${{ github.repository }}/bridge:latest
          build-args: |
            BAMBU_SLICER_VERSION=${{ matrix.bambu-version }}
            BNL_TOKEN=${{ secrets.BNL_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
